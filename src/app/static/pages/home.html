<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · Homelab</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2b2620">
</head>
<body class="bg-canvas text-ink min-h-screen flex flex-col font-sans antialiased">

  <header class="sticky top-0 z-20 border-b border-hairline bg-surface">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
      <a href="/static/pages/home.html" class="flex items-center gap-2 text-sm tracking-wide shrink-0">
        <span class="h-2 w-2 rounded-full bg-accent led-pulse" aria-hidden="true"></span>
        HOMELAB
      </a>

      <nav aria-label="Feature pages" class="hidden md:flex items-center divide-x divide-hairline border border-hairline text-xs tracking-wide overflow-x-auto">
        <span aria-current="page" class="px-3 py-1.5 flex items-center gap-1.5 text-ink whitespace-nowrap">
          <span class="h-1.5 w-1.5 rounded-full bg-accent" aria-hidden="true"></span>
          DASHBOARD
        </span>
        <a href="/static/pages/reminders.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">REMINDERS</a>
        <a href="/static/pages/todos.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">TASKS</a>
        <a href="/static/pages/journal.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">JOURNAL</a>
        <a href="/static/pages/codex.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">CODEX</a>
        <a href="/static/pages/bookmarks.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">BOOKMARKS</a>
        <a href="/static/pages/logger.html" class="px-3 py-1.5 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors whitespace-nowrap">LOGGER</a>
      </nav>

      <div class="hidden md:flex items-center gap-1.5 shrink-0 text-xs text-ink-dim tabular-nums">
        <span>LOCAL</span>
        <time id="clock">--:--:--</time>
      </div>

      <button id="nav-toggle" type="button" class="md:hidden flex flex-col justify-center gap-1.5 h-9 w-9 shrink-0" aria-expanded="false" aria-controls="mobile-drawer">
        <span class="sr-only">Toggle navigation</span>
        <span class="block h-px w-5 bg-ink" aria-hidden="true"></span>
        <span class="block h-px w-5 bg-ink" aria-hidden="true"></span>
        <span class="block h-px w-5 bg-ink" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div id="mobile-drawer-backdrop" class="md:hidden fixed inset-0 bg-black/60 z-30 hidden"></div>

  <aside id="mobile-drawer" class="md:hidden fixed top-0 right-0 h-full w-72 max-w-[80vw] bg-surface border-l border-hairline z-40 translate-x-full transition-transform duration-200 ease-out flex flex-col">
    <div class="h-14 flex items-center justify-between px-4 border-b border-hairline shrink-0">
      <span class="text-xs tracking-widest text-ink-dim">MENU</span>
      <button id="nav-close" type="button" class="text-ink-dim hover:text-ink text-lg leading-none px-2 py-1">
        <span aria-hidden="true">&times;</span>
        <span class="sr-only">Close menu</span>
      </button>
    </div>
    <nav aria-label="Feature pages (mobile)" class="flex flex-col p-2 text-sm tracking-wide overflow-y-auto">
      <span class="px-3 py-3 flex items-center gap-2 text-ink border-b border-hairline">
        <span class="h-1.5 w-1.5 rounded-full bg-accent" aria-hidden="true"></span>
        DASHBOARD
      </span>
      <a href="/static/pages/reminders.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors border-b border-hairline">REMINDERS</a>
      <a href="/static/pages/todos.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors border-b border-hairline">TASKS</a>
      <a href="/static/pages/journal.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors border-b border-hairline">JOURNAL</a>
      <a href="/static/pages/codex.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors border-b border-hairline">CODEX</a>
      <a href="/static/pages/bookmarks.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors border-b border-hairline">BOOKMARKS</a>
      <a href="/static/pages/logger.html" class="px-3 py-3 text-ink-dim hover:text-ink hover:bg-surface-raised transition-colors">LOGGER</a>
    </nav>
    <div class="mt-auto px-4 py-3 border-t border-hairline text-xs text-ink-dim flex items-center gap-1.5 tabular-nums shrink-0">
      <span>LOCAL</span>
      <time id="clock-mobile">--:--:--</time>
    </div>
  </aside>

  <main class="flex-1 w-full max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <details class="collapsible-mobile border border-hairline bg-surface p-5" open>
        <summary class="collapsible-toggle flex items-center justify-between cursor-pointer select-none py-2 md:pointer-events-none">
          <span class="text-sm font-medium text-ink">Focus</span>
          <svg class="w-4 h-4 text-ink-dim md:hidden" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
          </svg>
        </summary>
        <div class="collapsible-body pt-2">
          <div id="focus-list" class="space-y-2">
            <p class="text-sm text-ink-dim">Loading…</p>
          </div>
          <div id="focus-form-mount" class="mt-4 pt-4 border-t border-hairline"></div>
        </div>
      </details>

      <section aria-labelledby="upcoming-heading" class="border border-hairline bg-surface p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 id="upcoming-heading" class="text-xs tracking-widest text-ink-dim uppercase">Upcoming</h2>
          <a href="/static/pages/reminders.html" class="text-xs text-accent hover:underline">View all &rarr;</a>
        </div>
        <div id="reminders-list" class="space-y-2">
          <p class="text-sm text-ink-dim">Loading…</p>
        </div>
      </section>

      <section aria-labelledby="push-heading" class="border border-hairline bg-surface p-5">
        <h2 id="push-heading" class="text-xs tracking-widest text-ink-dim uppercase mb-4">Notifications</h2>
        <button id="enable-push-btn" type="button" class="px-4 py-2 border border-accent text-accent text-xs uppercase tracking-wide hover:bg-accent hover:text-canvas transition-colors">
          Enable Notifications
        </button>
        <p id="push-status" class="text-sm text-ink-dim mt-2 hidden"></p>
      </section>
    </div>

    <details class="collapsible-mobile border border-hairline bg-surface p-5" open>
      <summary class="collapsible-toggle flex items-center justify-between cursor-pointer select-none py-2 md:pointer-events-none">
        <span class="text-sm font-medium text-ink">Shortcuts</span>
        <svg class="w-4 h-4 text-ink-dim md:hidden" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
        </svg>
      </summary>
      <div class="collapsible-body pt-2">
        <div id="shortcuts-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
          <p class="text-sm text-ink-dim">Loading…</p>
        </div>
        <div id="shortcut-form-mount" class="mt-4 pt-4 border-t border-hairline"></div>
      </div>
    </details>
  </main>

  <footer class="border-t border-hairline px-4 sm:px-6 py-4 text-xs text-ink-dim">
    HOMELAB
  </footer>

  <script type="module" src="/static/js/home.js"></script>
</body>
</html>
