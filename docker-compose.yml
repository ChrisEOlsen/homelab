name: ${APP_NAME:-my-gova-app}

services:
  app:
    build:
      context: .
      target: app
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ./src:/src
      - ./data:/data
      - ./logs:/logs
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    env_file: .env

  mcp:
    build:
      context: .
      target: mcp
    volumes:
      - ./src:/src
      - ./data:/data
    restart: unless-stopped
    stdin_open: true

volumes:
  go-build-cache:
  go-mod-cache:
